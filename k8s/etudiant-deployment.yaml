apiVersion: apps/v1
kind: Deployment
metadata:
  name: etudiant-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etudiant-api
  template:
    metadata:
      labels:
        app: etudiant-api
    spec:
      containers:
      - name: etudiant-api
        # REMPLACE <ton-username> par ton pseudo Docker Hub lors du build réel
        image: najjaramin/etudiant-service:2.0
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://db:5432/etudiantsdb
        - name: SPRING_DATASOURCE_USERNAME
          value: postgres
        - name: SPRING_DATASOURCE_PASSWORD
          value: password
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: etudiant-service
spec:
  type: NodePort
  selector:
    app: etudiant-api
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
    nodePort: 30001
version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: etudiants-db
    environment:
      POSTGRES_DB: etudiantsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d etudiantsdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - etudiants-network

  api:
    build: ./api-spring-boot
    container_name: etudiants-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/etudiantsdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy
    networks:
      - etudiants-network

networks:
  etudiants-network:
    driver: bridge
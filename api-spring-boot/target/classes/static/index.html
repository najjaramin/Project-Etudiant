<!DOCTYPE html>
<html>
<head><title>Gestion Étudiants</title></head>
<body>
    <h1>Liste des Étudiants (Fetch API)</h1>
    <table border="1" id="etudiantsTable">
        <thead><tr><th>Nom</th><th>CIN</th><th>Âge</th></tr></thead>
        <tbody></tbody>
    </table>
    <script>
        fetch('/api/etudiants')
            .then(res => res.json())
            .then(data => {
                const tbody = document.querySelector('#etudiantsTable tbody');
                data.forEach(e => {
                    tbody.innerHTML += "<tr><td>"+e.nom+"</td><td>"+e.cin+"</td><td>"+e.age+"</td></tr>";
                });
            });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Étudiants</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 32px;
            color: #0f172a;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 16px;
        }

        /* Grille du Formulaire */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--secondary);
        }

        input {
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn {
            cursor: pointer;
            font-weight: 600;
            border-radius: 8px;
            transition: transform 0.1s, opacity 0.2s;
            border: none;
        }

        .btn:active { transform: scale(0.98); }

        .btn-add {
            background-color: var(--primary);
            color: white;
            padding: 12px;
            grid-column: 1 / -1;
            font-size: 1rem;
        }

        .btn-delete {
            background-color: #fee2e2;
            color: var(--danger);
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        .btn-delete:hover { background-color: var(--danger); color: white; }

        /* Tableau */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 24px;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            background: #f8fafc;
            color: var(--secondary);
            font-weight: 600;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
        }

        tr:hover { background-color: #fcfcfc; }

        .empty-msg { text-align: center; color: var(--secondary); padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 Gestion de l'Annuaire Étudiant</h1>

    <div class="form-grid">
        <div class="form-group">
            <label>Nom & Prénom</label>
            <input type="text" id="nom" placeholder="Ex: Jean Dupont">
        </div>
        <div class="form-group">
            <label>Numéro CIN</label>
            <input type="text" id="cin" placeholder="Ex: 01234567">
        </div>
        <div class="form-group">
            <label>Date de Naissance</label>
            <input type="date" id="dateNaissance">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="etudiant@ecole.com">
        </div>
        <button class="btn btn-add" onclick="ajouterEtudiant()">➕ Enregistrer l'étudiant</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>CIN</th>
                <th>Nom & Prénom</th>
                <th>Âge</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="etudiantsTable">
            </tbody>
    </table>
</div>

<script>
    const API_URL = '/api/etudiants';

    // 1. Charger la liste
    async function chargerEtudiants() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            const tbody = document.getElementById('etudiantsTable');
            tbody.innerHTML = data.length === 0 ? '<tr><td colspan="5" class="empty-msg">Aucun étudiant trouvé</td></tr>' : '';
            
            data.forEach(e => {
                const row = `
                    <tr>
                        <td><strong>${e.cin}</strong></td>
                        <td>${e.nom}</td>
                        <td>${e.age} ans</td>
                        <td>${e.email}</td>
                        <td>
                            <button class="btn btn-delete" onclick="supprimerEtudiant('${e.id}')">Supprimer</button>
                        </td>
                    </tr>`;
                tbody.innerHTML += row;
            });
        } catch (err) {
            console.error("Erreur de chargement:", err);
        }
    }

    // 2. Ajouter un étudiant
    async function ajouterEtudiant() {
        const payload = {
            nom: document.getElementById('nom').value,
            cin: document.getElementById('cin').value,
            dateNaissance: document.getElementById('dateNaissance').value,
            email: document.getElementById('email').value
        };

        if (!payload.nom || !payload.cin || !payload.dateNaissance) {
            alert("Veuillez remplir tous les champs obligatoires");
            return;
        }

        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        // Reset formulaire
        document.getElementById('nom').value = '';
        document.getElementById('cin').value = '';
        document.getElementById('dateNaissance').value = '';
        document.getElementById('email').value = '';
        
        chargerEtudiants();
    }

    // 3. Supprimer un étudiant
    async function supprimerEtudiant(id) {
        if (confirm("Êtes-vous sûr de vouloir supprimer cet étudiant ?")) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            chargerEtudiants();
        }
    }

    // Lancer au chargement
    window.onload = chargerEtudiants;
</script>

</body>
</html>
